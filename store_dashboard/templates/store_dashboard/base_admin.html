{% load static %}
<!DOCTYPE html>
<html lang ="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1B4Iw1l+UoHljGtbDqHRpt5TR1+t0odE2no0LYhJH0ZyQxq43Qd0g26Cyh9I+4FzKg=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{% static 'css/ownerstyle.css' %}">
    <title>{% block title %}RBL Admin{% endblock %}</title>
</head>
<body>
<header>
    <div class="header-container">
        <div class="header-inside">
            <div class="header-logo"><img src="{% static 'images/TemporaryLogo.png' %}" alt="Logo" class="logo"></div>
        </div>
    </div>
</header>
<aside>
    <nav>
        <div class="nav-spacer">
            <a href="{% url 'dashboard_home' %}">Dashboard</a>
        
        <div class="dropdown">
            <button class="dropbtn">Products 
                <span class="caret"></span>
            </button>
            <div class="dropdown-content">
                <a href="adminAddProduct">Add Product</a>
                <a href="adminProducts">Manage Products</a>
                <a href="adminAddCategory">Add Category</a>
                <a href="adminCategories">Manage Categories</a>
                <a href="adminAddBrand">Add Brand</a>
                <a href="adminBrands">Manage Brands</a>
            </div>
        </div>
        <div class="dropdown">
            <button class="dropbtn">Orders 
                <span class="caret"></span>
            </button>
            <div class="dropdown-content">
                <a href="adminOrders">View Orders</a>
            </div>
        </div>
        <div class="dropdown">
            <button class="dropbtn">Payments
                <span class="caret"></span>
            </button>
            <div class="dropdown-content">
                <a href="adminPayments">Manage Payments</a>
            </div>
        </div>
        <div class="dropdown">
            <button class="dropbtn">Users 
                <span class="caret"></span>
            </button>
            <div class="dropdown-content">
                <a href="adminUsers">View Users</a>
            </div>
        </div>
        <form action="{% url 'logout' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button button class="dropbtn" type="submit" name="logout">Logout</button>
        </form>
        </div>  
    </nav>
</aside>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const dropdowns = document.querySelectorAll('.dropdown');
    dropdowns.forEach(function(dropdown) {
        const btn = dropdown.querySelector('.dropbtn');
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            // Close other open dropdowns
            dropdowns.forEach(function(d) {
                if (d !== dropdown) d.classList.remove('open');
            });
            // Toggle current dropdown only
            dropdown.classList.toggle('open');
        });
    });
});
</script>

{% block content %}{% endblock %}
</body>
</html>
