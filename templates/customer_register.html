{% load static %}
<!DOCTYPE html>
<html lang ="en">
<head>
    <title>Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<header>
    <div class="header-container">
        <div class="header-inside">
            <div class="header-logo"><img src="{% static 'images/TemporaryLogo.png' %}" alt="Logo" class="logo"></div>
        </div>
    </div>
</header>
<main>
    <div class="register-container-container">
        <div class="register-container">
            <h2>User Registration</h2>
            <p>Create your account!</p>
            <p>Please fill in the details below to register.</p>
            {% if messages %}
            <div class="error-messages" style="color: red; margin-bottom: 1rem; text-align: center;">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}
            <form action="{% url 'register' %}" method="post">
                {% csrf_token %}
                <div class="fullname-field">
                    <div class="name-field">
                        <label for="firstname">First Name:</label>
                        <input type="text" id="firstname" name="firstname" required>
                    </div>
                    <div class="name-field">
                        <label for="middlename">Middle Name:</label>
                        <input type="text" id="middlename" name="middlename" required>
                    </div>
                    <div class="name-field">
                        <label for="lastname">Last Name:</label>
                        <input type="text" id="lastname" name="lastname" required>
                    </div>
                </div>
                

                <label for="birthdate">Date of Birth</label>
                <input type="date" id="birthdate" name="birthdate" required>

                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>

                <label for="address">Address:</label>
                <input type="text" id="address" name="address" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label for="confirm-password">Confirm Password:</label>
                <input type="password" id="confirm-password" name="confirm-password" required>

                <button type="submit">Register</button>
            </form>
            <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </div>
</main>
<footer>
    <p>&copy; 2026 RBL.</p>
</footer>
</body>
</html>
